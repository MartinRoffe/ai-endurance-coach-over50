{# recipes_section: recipes | recipes_weekend | recipes_griddle #}
<style>
  .rec-hero-tabs {
    margin-top: 24px;
  }
  .rec-hero-tabs-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .rec-hero-tabs-group {
    display: inline-flex;
    max-width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .rec-hero-tabs-group::-webkit-scrollbar { display: none; }
  .rec-hero-tabs-group a {
    flex-shrink: 0;
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--muted);
    border-right: 1px solid var(--border);
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .rec-hero-tabs-group a:last-child { border-right: none; }
  .rec-hero-tabs-group a:hover {
    color: var(--text);
    background: var(--surface2);
  }
  .rec-hero-tabs-group a.active {
    color: var(--accent);
    background: rgba(200, 241, 53, 0.1);
  }
  @media (max-width: 680px) {
    .rec-hero-tabs-group a { padding: 10px 12px; }
  }
</style>
<div class="rec-hero-tabs" role="navigation" aria-label="Recipe guides">
  <div class="rec-hero-tabs-label">Recipe guides</div>
  <div class="rec-hero-tabs-group">
    <a href="/nutrition/recipes" class="{% if recipes_section == 'recipes' %}active{% endif %}">Cook Once · Week</a>
    <a href="/nutrition/recipes/weekend-fuel" class="{% if recipes_section == 'recipes_weekend' %}active{% endif %}">Weekend Ride Fuel</a>
    <a href="/nutrition/recipes/griddle" class="{% if recipes_section == 'recipes_griddle' %}active{% endif %}">Blackstone Griddle</a>
  </div>
</div>
