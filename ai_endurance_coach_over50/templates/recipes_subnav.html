{# recipes_section: recipes | recipes_weekend | recipes_griddle #}
<style>
  .rec-subnav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .rec-subnav-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .rec-subnav-inner::-webkit-scrollbar { display: none; }
  .rec-subnav a {
    flex-shrink: 0;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .rec-subnav a:hover { color: var(--text); }
  .rec-subnav a.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  @media (max-width: 680px) {
    .rec-subnav-inner { padding: 0 14px; }
  }
</style>
<nav class="rec-subnav" aria-label="Recipe guides">
  <div class="rec-subnav-inner">
    <a href="/nutrition/recipes" class="{% if recipes_section == 'recipes' %}active{% endif %}">Cook Once · Week</a>
    <a href="/nutrition/recipes/weekend-fuel" class="{% if recipes_section == 'recipes_weekend' %}active{% endif %}">Weekend Ride Fuel</a>
    <a href="/nutrition/recipes/griddle" class="{% if recipes_section == 'recipes_griddle' %}active{% endif %}">Blackstone Griddle</a>
  </div>
</nav>
