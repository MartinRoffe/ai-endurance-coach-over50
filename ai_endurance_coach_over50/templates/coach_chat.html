<!-- ── AI Coach Chat ──────────────────────────────────────────────── -->
<div class="card" style="padding:20px 24px;margin-bottom:16px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <p class="eyebrow" style="margin-bottom:2px">AI Coach</p>
      <p style="font-family:var(--font-m);font-size:11px;color:var(--muted)">Ask about your training load, sessions, or request plan adjustments</p>
    </div>
    <button onclick="clearChatHistory()" style="font-family:var(--font-m);font-size:11px;letter-spacing:0.1em;color:var(--muted);background:none;border:1px solid var(--border);padding:4px 10px;cursor:pointer;border-radius:2px">CLEAR</button>
  </div>

  <div id="chat-messages" style="min-height:100px;max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding-right:2px">
    <p id="chat-empty" style="font-family:var(--font-m);font-size:12px;color:var(--muted);text-align:center;padding:32px 0">Ask your coach anything about your training...</p>
  </div>

  <div id="proposal-cards" style="display:none;flex-direction:column;gap:10px;margin-bottom:12px"></div>

  <div style="display:flex;gap:8px;align-items:flex-end">
    <textarea id="coach-input" rows="1" placeholder="e.g. How is my training load looking this week?"
      style="flex:1;background:#111113;border:1px solid var(--border);color:var(--text);font-family:var(--font-m);font-size:13px;padding:10px 14px;outline:none;border-radius:2px;resize:none;overflow-y:hidden;line-height:1.5;min-height:40px;max-height:160px"
      onfocus="this.style.borderColor='rgba(99,102,241,0.5)'" onblur="this.style.borderColor='var(--border)'"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,160)+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendCoachMessage()}"></textarea>
    <button id="send-btn" onclick="sendCoachMessage()"
      style="font-family:var(--font-m);font-size:11px;letter-spacing:0.12em;background:var(--accent);color:var(--text);border:none;padding:10px 20px;cursor:pointer;border-radius:2px;white-space:nowrap;flex-shrink:0;height:40px">SEND</button>
  </div>
</div>

<script>
(function() {
  let _proposals = [];

  function mdToHtml(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text);font-weight:500">$1</strong>');
  }

  function updateBubble(bubble, text, streaming) {
    const paras = text.trim().split(/\n\n+/);
    bubble.innerHTML = '';
    paras.forEach((para, i) => {
      if (!para.trim()) return;
      const p = document.createElement('p');
      if (i > 0) p.style.marginTop = '8px';
      const isLast = i === paras.length - 1;
      p.innerHTML = mdToHtml(para.trim()) + (streaming && isLast ? '<span style="color:var(--muted)"> ▋</span>' : '');
      bubble.appendChild(p);
    });
  }

  function renderMessage(role, text) {
    const empty = document.getElementById('chat-empty');
    if (empty) empty.remove();
    const wrap = document.createElement('div');
    wrap.style.cssText = role === 'user' ? 'display:flex;justify-content:flex-end' : 'display:flex;justify-content:flex-start';
    const bubble = document.createElement('div');
    if (role === 'user') {
      bubble.style.cssText = 'max-width:72%;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.2);padding:10px 14px;border-radius:2px;font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap';
      bubble.textContent = text;
    } else {
      bubble.style.cssText = 'max-width:85%;background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--accent);padding:10px 14px;border-radius:2px;font-size:13px;color:var(--text-dim);line-height:1.75';
      updateBubble(bubble, text, false);
    }
    wrap.appendChild(bubble);
    document.getElementById('chat-messages').appendChild(wrap);
    document.getElementById('chat-messages').scrollTop = 99999;
    return bubble;
  }

  function proposalSummary(proposal) {
    const currLabel = proposal.current_session_label || 'Session';
    const newLabel = proposal.session_label || 'Session';
    const currDur = proposal.current_duration_min ? `${proposal.current_duration_min} min` : 'current';
    const newDur = `${proposal.duration_min} min`;
    const labelLine = currLabel !== newLabel
      ? `<strong>${currLabel}</strong> → <strong>${newLabel}</strong>`
      : `<strong>${newLabel}</strong>`;
    const durLine = currDur !== newDur
      ? `${currDur} → <strong>${newDur}</strong>`
      : `<strong>${newDur}</strong>`;
    return `${labelLine} on <strong>${proposal.date}</strong>: ${durLine}<br><span style="color:var(--muted);font-size:12px;margin-top:4px;display:inline-block">${mdToHtml(proposal.reason)}</span>`;
  }

  function renderProposals(proposals) {
    _proposals = proposals.filter(p => p && p.session_type);
    const container = document.getElementById('proposal-cards');
    container.innerHTML = '';
    if (!_proposals.length) {
      container.style.display = 'none';
      return;
    }
    _proposals.forEach((proposal, idx) => {
      const card = document.createElement('div');
      card.style.cssText = 'background:rgba(96,165,250,0.05);border:1px solid rgba(96,165,250,0.2);border-left:3px solid #60a5fa;padding:14px 16px;border-radius:2px';
      card.innerHTML = `
        <p style="font-family:var(--font-m);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#60a5fa;margin-bottom:8px">Proposed Change</p>
        <p style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:12px">${proposalSummary(proposal)}</p>
        <div style="display:flex;gap:8px">
          <button data-idx="${idx}" class="apply-proposal-btn" style="font-family:var(--font-m);font-size:11px;letter-spacing:0.1em;background:#60a5fa;color:#09090b;border:none;padding:7px 16px;cursor:pointer;border-radius:2px;font-weight:600">APPLY CHANGE</button>
          <button data-idx="${idx}" class="dismiss-proposal-btn" style="font-family:var(--font-m);font-size:11px;letter-spacing:0.1em;background:none;color:var(--muted);border:1px solid var(--border);padding:7px 14px;cursor:pointer;border-radius:2px">DISMISS</button>
        </div>`;
      container.appendChild(card);
    });
    container.style.display = 'flex';
    container.querySelectorAll('.apply-proposal-btn').forEach(btn => {
      btn.addEventListener('click', () => applyProposal(Number(btn.dataset.idx)));
    });
    container.querySelectorAll('.dismiss-proposal-btn').forEach(btn => {
      btn.addEventListener('click', () => dismissProposal(Number(btn.dataset.idx)));
    });
  }

  window.dismissProposal = function(idx) {
    if (typeof idx === 'number') {
      _proposals.splice(idx, 1);
      renderProposals(_proposals);
      return;
    }
    _proposals = [];
    const container = document.getElementById('proposal-cards');
    container.style.display = 'none';
    container.innerHTML = '';
  };

  window.applyProposal = async function(idx) {
    const proposal = typeof idx === 'number' ? _proposals[idx] : _proposals[0];
    if (!proposal || !proposal.session_type) return;
    const container = document.getElementById('proposal-cards');
    const btn = container.querySelector(`.apply-proposal-btn[data-idx="${idx}"]`);
    if (btn) {
      btn.textContent = 'APPLYING…';
      btn.disabled = true;
    }
    try {
      const res = await fetch('/apply-plan-change', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          date: proposal.date,
          duration_min: proposal.duration_min,
          reason: proposal.reason,
          session_type: proposal.session_type || null,
          label: proposal.session_label || null,
        }),
      });
      let data = {};
      try { data = await res.json(); } catch (e) {}
      if (res.ok && data.ok) {
        if (typeof idx === 'number') dismissProposal(idx);
        else dismissProposal();
        const g = data.garmin || {};
        const sync = g.pushed
          ? ' Pushed to Garmin Connect.'
          : ' Saved locally — Garmin sync failed, it will reconcile on the next full sync.';
        const durText = data.duration_min ? `**${data.duration_min} min**` : '**rest day**';
        renderMessage('assistant', `✓ Applied: **${data.label}** on ${data.date} updated to ${durText}.${sync}`);
      } else {
        if (btn) {
          btn.textContent = 'FAILED — RETRY';
          btn.disabled = false;
        }
        const detail = data.detail;
        const msg = typeof detail === 'string' ? detail
          : Array.isArray(detail) && detail[0]?.msg ? detail[0].msg
          : 'Could not apply that change.';
        renderMessage('assistant', `Could not apply the plan change: ${msg}`);
      }
    } catch(e) {
      if (btn) {
        btn.textContent = 'FAILED — RETRY';
        btn.disabled = false;
      }
      renderMessage('assistant', 'Connection error applying the plan change. Please try again.');
    }
  };

  window.sendCoachMessage = async function() {
    const input = document.getElementById('coach-input');
    const btn = document.getElementById('send-btn');
    const text = input.value.trim();
    if (!text || btn.disabled) return;
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    btn.textContent = '…';
    dismissProposal();
    renderMessage('user', text);

    // Create streaming bubble immediately
    const empty = document.getElementById('chat-empty');
    if (empty) empty.remove();
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;justify-content:flex-start';
    const bubble = document.createElement('div');
    bubble.style.cssText = 'max-width:85%;background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--accent);padding:10px 14px;border-radius:2px;font-size:13px;color:var(--text-dim);line-height:1.75';
    bubble.innerHTML = '<span style="color:var(--muted)">▋</span>';
    wrap.appendChild(bubble);
    document.getElementById('chat-messages').appendChild(wrap);
    document.getElementById('chat-messages').scrollTop = 99999;

    let accumulated = '';

    try {
      const res = await fetch('/coach-chat-stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text}),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});

        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          try {
            const event = JSON.parse(part.slice(6));
            if (event.type === 'text') {
              accumulated += event.chunk;
              updateBubble(bubble, accumulated, true);
              document.getElementById('chat-messages').scrollTop = 99999;
            } else if (event.type === 'tool') {
              if (!accumulated) {
                const labels = {
                  get_meal_cycle: 'the meal plan', get_activity_analysis: 'your session analysis',
                  get_sleep_history: 'your sleep history', get_performance_detail: 'your performance data',
                  get_hr_plan: 'the Haute Route plan', get_compliance_detail: 'your plan compliance',
                  get_workout_description: 'the workout details', get_fuelling_plan: 'your fuelling plan',
                  get_event_plans: 'your event plans',
                };
                bubble.innerHTML = '<span style="color:var(--muted)">🔍 checking ' +
                  (labels[event.name] || 'your data') + '…</span>';
              }
            } else if (event.type === 'proposal' && event.data && event.data.session_type) {
              const existing = _proposals.some(p => p.date === event.data.date);
              if (!existing) _proposals.push(event.data);
              renderProposals(_proposals);
            } else if (event.type === 'done') {
              if (accumulated) updateBubble(bubble, accumulated, false);
            } else if (event.type === 'error') {
              bubble.innerHTML = '<p style="color:var(--muted)">Something went wrong. Please try again.</p>';
            }
          } catch(e) {}
        }
      }
    } catch(e) {
      bubble.innerHTML = '<p style="color:var(--muted)">Connection error. Please try again.</p>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'SEND';
      input.focus();
    }
  };

  window.clearChatHistory = async function() {
    if (!confirm('Clear the conversation history?')) return;
    await fetch('/coach-history', {method: 'DELETE'});
    document.getElementById('chat-messages').innerHTML = '<p id="chat-empty" style="font-family:var(--font-m);font-size:12px;color:var(--muted);text-align:center;padding:32px 0">Ask your coach anything about your training...</p>';
    dismissProposal();
  };

  async function loadHistory() {
    try {
      const res = await fetch('/coach-history');
      const history = await res.json();
      history.forEach(m => renderMessage(m.role, m.content));
      if (history.length) document.getElementById('chat-messages').scrollTop = 99999;
    } catch(e) {}
  }

  loadHistory();
})();
</script>
